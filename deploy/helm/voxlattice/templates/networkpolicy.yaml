{{- if .Values.networkPolicy.enabled }}
# Default-denies ingress to the pods and re-allows only the listed peers.
# Traefik reaches the gRPC port from its own namespace, so include it in
# networkPolicy.grpcFrom when the IngressRoute is enabled.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "voxlattice.fullname" . }}
  labels:
    {{- include "voxlattice.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "voxlattice.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- with .Values.networkPolicy.grpcFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - port: grpc
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.httpFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - port: http
          protocol: TCP
    {{- end }}
{{- end }}
