name: Bug report
description: Report a reproducible defect in VoxLattice
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private data, or audio. Report security issues privately according to SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or full commit hash
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Python, OS, Docker, NVIDIA runtime, driver, and GPU name where relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest deterministic sequence of commands or code.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized logs or metrics, never PCM or credentials.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed secrets, personal data, and audio from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
