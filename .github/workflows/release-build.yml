name: Reproducible release build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-only:
    name: Build release candidates
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6 # v6.6.1
        with:
          version: "0.11.7"
          python-version: "3.12"
      - run: uv sync --all-packages --dev --frozen
      - run: make wheels
      - run: >-
          uv run pip-audit --format cyclonedx-json --output sbom-python.json
          --ignore-vuln PYSEC-2026-139 --ignore-vuln PYSEC-2025-194
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unsigned-release-candidates
          path: |
            generated/dist/
            third_party/fastenhancer/dist/
            packages/livekit-plugins-fastenhancer/dist/
            services/fastenhancer-server/dist/
            sbom-python.json
            LICENSE
            THIRD_PARTY_NOTICES.md
