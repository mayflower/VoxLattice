name: Reproducible release build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-only:
    name: Build release candidates
    runs-on: mayflower-k8s-runners
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install make
        # The shared runner image is minimal; every other tool this job needs
        # (python3, docker, git, uv via setup-uv) is already present.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.7"
          python-version: "3.12"
      - run: uv sync --all-packages --dev --frozen
      - run: make wheels
      - run: >-
          uv run pip-audit --format cyclonedx-json --output sbom-python.json
          --ignore-vuln PYSEC-2026-139 --ignore-vuln PYSEC-2025-194
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-release-candidates
          path: |
            generated/dist/
            third_party/fastenhancer/dist/
            packages/livekit-plugins-fastenhancer/dist/
            services/fastenhancer-server/dist/
            sbom-python.json
            LICENSE
            THIRD_PARTY_NOTICES.md
