name: Dependency and container security

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Audit dependencies and container
    runs-on: mayflower-k8s-runners
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write # Upload container scan results to code scanning.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install make
        # The shared runner image is minimal; every other tool this job needs
        # (python3, docker, git, uv via setup-uv) is already present.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.7"
          python-version: "3.12"
      - run: uv sync --all-packages --dev --frozen
      - run: make audit
      - name: Build image when model cache is available
        run: make model image
      - id: container-report
        name: Report all container findings
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: voxlattice:0.1.0
          fail-build: false
          severity-cutoff: high
          output-format: sarif
      - name: Upload container findings to code scanning
        if: always() && steps.container-report.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: ${{ steps.container-report.outputs.sarif }}
      - name: Reject actionable high and critical findings
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: voxlattice:0.1.0
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: table
          config: .github/grype-gate.yaml
