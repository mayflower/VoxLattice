name: GPU validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpu-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gpu:
    name: Validate on configured GPU runner
    runs-on: [self-hosted, linux, x64, rtx-a6000]
    timeout-minutes: 90
    env:
      FASTENHANCER_GPU_DEVICE_ID: ${{ vars.FASTENHANCER_GPU_DEVICE_ID }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          version: "0.11.7"
          python-version: "3.12"
          enable-cache: true
      - run: nvidia-smi --query-gpu=index,name,driver_version --format=csv
      - run: uv sync --all-packages --dev --frozen
      - run: make model
      - name: Run GPU tests
        run: make test-gpu
      - run: make image
      - name: Start server
        env:
          FASTENHANCER_API_TOKEN: ${{ secrets.FASTENHANCER_API_TOKEN }}
        run: make up
      - name: Smoke and benchmark
        env:
          FASTENHANCER_API_TOKEN: ${{ secrets.FASTENHANCER_API_TOKEN }}
          BENCH_TARGET_STREAMS: "16"
        run: |
          make smoke
          make benchmark
      - if: always()
        run: make down
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gpu-validation
          path: artifacts/validation/
