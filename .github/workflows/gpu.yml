name: GPU validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpu-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gpu:
    name: Validate on a GPU runner
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 90
    env:
      # The server drives a single device, so the first GPU on the runner is
      # the right default whatever it happens to be. Set the repository
      # variable only to pin a specific device on a multi-GPU host.
      FASTENHANCER_GPU_DEVICE_ID: ${{ vars.FASTENHANCER_GPU_DEVICE_ID || '0' }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6 # v6.6.1
        with:
          version: "0.11.7"
          python-version: "3.12"
          enable-cache: true
      - name: Show the GPUs visible to the runner
        run: nvidia-smi --query-gpu=index,name,driver_version --format=csv
      - name: Generate an ephemeral API token
        # The token only authenticates the smoke client against the server
        # started in this job, so it does not need to outlive the run.
        run: echo "FASTENHANCER_API_TOKEN=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - run: uv sync --all-packages --dev --frozen
      - run: make model
      - name: Run GPU tests
        run: make test-gpu
      - run: make image
      - name: Start server
        run: make up
      - name: Smoke and benchmark
        env:
          BENCH_TARGET_STREAMS: "16"
        run: |
          make smoke
          make benchmark
      - if: always()
        run: make down
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gpu-validation
          path: artifacts/validation/
