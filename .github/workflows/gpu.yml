name: RTX A6000 validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gpu:
    runs-on: [self-hosted, linux, x64, rtx-a6000]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6
        with:
          version: "0.11.7"
          python-version: "3.12"
          enable-cache: true
      - run: nvidia-smi --query-gpu=index,uuid,name,driver_version --format=csv
      - run: uv sync --all-packages --dev --frozen
      - run: make model
      - run: make test-gpu
      - run: make image
      - name: Start server
        env:
          FASTENHANCER_API_TOKEN: ${{ secrets.FASTENHANCER_API_TOKEN }}
        run: make up
      - name: Smoke and benchmark
        env:
          FASTENHANCER_API_TOKEN: ${{ secrets.FASTENHANCER_API_TOKEN }}
          BENCH_TARGET_STREAMS: "16"
        run: |
          make smoke
          make benchmark
      - if: always()
        run: make down
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: a6000-validation
          path: artifacts/validation/
