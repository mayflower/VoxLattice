name: CPU CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cpu-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python }} quality
    runs-on: mayflower-k8s-runners
    timeout-minutes: 30
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install make
        # The shared runner image is minimal; every other tool this job needs
        # (python3, docker, git, uv via setup-uv) is already present.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.7"
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --all-packages --dev --frozen
      - name: Verify dependency lock
        run: uv lock --check
      - name: Lint GitHub Actions workflows
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output /tmp/actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum --check
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -config-file .github/actionlint.yaml .github/workflows/*.yml
      - name: Validate local Compose configuration
        env:
          FASTENHANCER_API_TOKEN: ci-compose-validation-token
          FASTENHANCER_GPU_DEVICE_ID: GPU-ci-placeholder
        run: docker compose -f deploy/docker-compose.yml --profile test config --quiet
      - name: Validate TLS Compose overlays
        env:
          FASTENHANCER_API_TOKEN: ci-compose-validation-token
          FASTENHANCER_GPU_DEVICE_ID: GPU-ci-placeholder
          FASTENHANCER_TLS_CERTIFICATE: /tmp/server.crt
          FASTENHANCER_TLS_PRIVATE_KEY: /tmp/server.key
          FASTENHANCER_TLS_CLIENT_CA: /tmp/client-ca.crt
        run: >-
          docker compose
          -f deploy/docker-compose.yml
          -f deploy/docker-compose.tls.yml
          -f deploy/docker-compose.mtls.yml
          config --quiet
      - name: Validate Kubernetes chart
        env:
          HELM_VERSION: 4.2.2
          HELM_SHA256: 9adafecab4d406853bba163a70e9f104f47dbbf65ce24b7653bae7e36150bcb6
          KUBECONFORM_VERSION: 0.8.0
          KUBECONFORM_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
        run: |
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" \
            --output /tmp/helm.tar.gz
          echo "${HELM_SHA256}  /tmp/helm.tar.gz" | sha256sum --check
          tar -xzf /tmp/helm.tar.gz -C /tmp linux-amd64/helm
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            --output /tmp/kubeconform.tar.gz
          echo "${KUBECONFORM_SHA256}  /tmp/kubeconform.tar.gz" | sha256sum --check
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          make helm-check HELM=/tmp/linux-amd64/helm KUBECONFORM=/tmp/kubeconform
      - run: make check
      - run: make test
      - run: make test-integration
      - run: make wheels
      - name: Wheel import in clean environment
        run: |
          uv venv --clear /tmp/wheel-test
          uv pip install --python /tmp/wheel-test/bin/python \
            generated/dist/*.whl third_party/fastenhancer/dist/*.whl \
            packages/livekit-plugins-fastenhancer/dist/*.whl \
            services/fastenhancer-server/dist/*.whl
          /tmp/wheel-test/bin/python -c "from fastenhancer.v1 import enhancement_pb2; from fastenhancer_server.main import main; from livekit.plugins import fastenhancer; assert callable(main); print(fastenhancer.__version__, enhancement_pb2.DESCRIPTOR.package)"
      - run: make audit
      - name: Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: services/fastenhancer-server/Dockerfile
