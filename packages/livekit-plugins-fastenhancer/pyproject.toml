[project]
name = "livekit-plugins-fastenhancer"
version = "0.1.0"
description = "Remote FastEnhancer FrameProcessor for LiveKit"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.12,<3.14"
dependencies = [
  "fastenhancer-protocol",
  "grpcio==1.70.0",
  "livekit>=1.1.13,<1.2",
]
keywords = ["audio", "livekit", "noise-suppression", "speech", "voxlattice"]

classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Multimedia :: Sound/Audio :: Speech",
]

[project.urls]
Documentation = "https://github.com/mayflower/VoxLattice/blob/main/docs/livekit.md"
Issues = "https://github.com/mayflower/VoxLattice/issues"
Source = "https://github.com/mayflower/VoxLattice"

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["livekit"]
